<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#160f20">
  <title>Even offline · Zolder Resort</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 1.25rem; background: radial-gradient(circle at top, #34223d, #160f20 55%, #0e0915); color: #fffaf4; }
    main { width: min(100%, 28rem); padding: 2rem 1.4rem; border: 1px solid rgba(255,255,255,.14); border-radius: 24px; background: rgba(255,255,255,.07); text-align: center; box-shadow: 0 24px 70px rgba(0,0,0,.35); }
    span { font-size: 2.5rem; }
    h1 { margin: .7rem 0; font: 500 2rem/1.05 Georgia, serif; color: #f0b7c7; }
    p { margin: 0 0 1.2rem; color: #cfc5d6; }
    a { display: inline-flex; min-height: 48px; padding: .75rem 1rem; align-items: center; border-radius: 14px; background: linear-gradient(135deg, #f0b7c7, #f6d99a); color: #281522; font-weight: 800; text-decoration: none; }
    a:focus-visible { outline: 3px solid #f6d99a; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <span aria-hidden="true">🛎️</span>
    <h1>Even geen verbinding</h1>
    <p>De roomservice is offline. Een eerder geopende versie van de app blijft beschikbaar; probeer anders opnieuw zodra de verbinding terug is.</p>
    <a href="./">Probeer de roomservice opnieuw</a>
  </main>
</body>
</html>
